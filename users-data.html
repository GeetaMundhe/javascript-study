<!DOCTYPE html>
<html>
<head>
    <title>Users List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

<div class="user-page">
    <div class="container">

        <div class="user-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="title">Users Details</h2>
                <a href="login.html" class="btn btn-primary">Back</a>
            </div>

            <div class="table-responsive">
                <table id="userTable" class="table custom-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Mobile No.</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>

    </div>
</div>

<script>
fetch("api.php?action=getUsers")

.then(res => res.json())
.then(users => {
    let tbody = document.querySelector("#userTable tbody");

    if(users.length === 0){
        tbody.innerHTML = `<tr><td colspan="3" class="text-center">No Users Found</td></tr>`;
        return;
    }

    users.forEach(user => {
        let row = `
            <tr>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.mobile}</td>
                 <td><button type="button" data-id="${user.id}" class="btn btn-warning edit-btn">Edit</button></td>
                <td><button data-id="${user.id}" type="button" class="btn btn-secondary delete-btn">Delete</button></td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
});


document.addEventListener("click", function(e) {

    if (e.target.classList.contains("delete-btn")) {
    let userId = e.target.getAttribute("data-id");

    fetch("api.php?action=deleteUser", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id: userId })
    })
        .then(res => res.json())
        .then(data => {
            if(data.success){
                e.target.closest("tr").remove(); // UI update
            } else {
                alert("Delete failed");
            }
        });

    }


    if (e.target.classList.contains("edit-btn")) {

        let row = e.target.closest("tr");

        let name = row.children[0].innerText;
        let email = row.children[1].innerText;
        let mobile = row.children[2].innerText;

        // Convert to input fields
        row.children[0].innerHTML = `<input value="${name}" class="form-control">`;
        row.children[1].innerHTML = `<input value="${email}" class="form-control">`;
        row.children[2].innerHTML = `<input value="${mobile}" class="form-control">`;

        // Change button to Save
        e.target.textContent = "Save";
        e.target.classList.remove("edit-btn");
        e.target.classList.add("save-btn");
    }

    // ================= SAVE CLICK =================
    else if (e.target.classList.contains("save-btn")) {

        let row = e.target.closest("tr");
        let id = e.target.getAttribute("data-id");

        let inputs = row.querySelectorAll("input");

        let name = inputs[0].value;
        let email = inputs[1].value;
        let mobile = inputs[2].value;

        fetch("api.php?action=updateUser", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ id, name, email, mobile })
        })
        .then(res => res.json())
        .then(data => {

            if(data.success){

                // Update UI back
                row.children[0].innerText = name;
                row.children[1].innerText = email;
                row.children[2].innerText = mobile;

                // Button back to Edit
                e.target.textContent = "Edit";
                e.target.classList.remove("save-btn");
                e.target.classList.add("edit-btn");

            } else {
                alert("Update failed");
            }

        });
    }


});

</script>

</body>
</html>
