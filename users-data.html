<!DOCTYPE html>
<html>
<head>
    <title>Users List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

<div class="user-page">
    <div class="container">

        <div class="user-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="title">Users Details</h2>
                <a href="login.html" class="btn btn-primary">Back</a>
            </div>

            <div class="table-responsive">
                <table id="userTable" class="table custom-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Mobile No.</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>

    </div>
</div>

<script>
fetch("get-users.php")
.then(res => res.json())
.then(users => {
    let tbody = document.querySelector("#userTable tbody");

    if(users.length === 0){
        tbody.innerHTML = `<tr><td colspan="3" class="text-center">No Users Found</td></tr>`;
        return;
    }

    users.forEach(user => {
        let row = `
            <tr>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.mobile}</td>
                 <td><button type="button" class="btn btn-secondary">Edit</button></td>
                <td><button data-id="${user.id}" type="button" class="btn btn-secondary">Delete</button></td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
});
</script>

</body>
</html>
