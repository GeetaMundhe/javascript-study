<!DOCTYPE html>
<html>
<head>
    <title>Users List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <div class="container">
        <h2>Users</h2>
        <br>
        <table border="1" id="userTable" class="w-50">
            <tr>
                <th class="border-end border-bottom">Name</th>
                <th class="border-bottom">Email</th>
                 
            </tr>
        </table>
        <a href="login.html" class="btn btn-primary mt-3">Back</a>
    </div>  
    <script>
        fetch("get-users.php")
        .then(res => res.json())
        .then(users => {
            let table = document.getElementById("userTable");

            users.forEach(user => {
                let row = `
                    <tr>
                        <td class="border-end">${user.name}</td>
                        <td>${user.email}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        });
    </script>

</body>
</html>
