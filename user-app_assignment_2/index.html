<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">            
    <title>Multiple Users Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="p-4">
 
<div class="container">   
    <h3>User Form</h3>

    <form id="userForm">
        <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
         <small id="nameError" class="text-danger"></small>
        
    
        <input type="text" id="email" class="form-control mb-2" placeholder="Email" required>
         <small id="emailError" class="text-danger"></small>

         <input type="number" id="mobile" class="form-control mb-2" placeholder="Mobile No" required>
         <small id="mobileError" class="text-danger"></small>

        <input type="password" id="password" class="form-control mb-2" placeholder="password" required>
         <small id="passwordError" class="text-danger"></small>

        <button type="submit" class="btn btn-primary mt-2">Register Now</button>
         <a href="login.html" type="button" class="btn btn-primary mt-2">Login </a>
    </form>

    

    
</div>

<script>
   document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let password = document.getElementById("password").value.trim();

    let isValid = true;

    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailPattern.test(email)){
        alert("Invalid email");
        return;
    }

    if(mobile.length !== 10){
        alert("Mobile must be 10 digits");
        return;
    }

    if(password.length < 6){
        alert("Password too short");
        return;
    }

    if (!name || !email || !password || !mobile) {
        alert("All fields required");
        return;
    }

    let newUser = { name, email, mobile, password };

    fetch("api.php?action=saveUser", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(newUser)
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "error") {
            alert(data.message);
        } else {
            alert("Registered successfully");
            window.location.href = "login.html";
        }
    });
});

</script>

</body>
</html>
